name: SmartDTC CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY:    ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/smartdtc

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/smartdtc_test
          JWT_SECRET: test_secret_key
          NODE_ENV:  test
        run: npm test -- --forceExit

  # ── Frontend Lint + Build ──────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint || true   # warn-only during CI bootstrap

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL:    http://localhost:5000/api/v1
          NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
        run: npm run build

  # ── AI Service Tests ───────────────────────────────────────────────────────
  ai-test:
    name: AI Service Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install AI dependencies
        working-directory: ai-service
        run: pip install -r requirements.txt

      - name: Run AI service smoke test
        working-directory: ai-service
        run: |
          python -c "
          from anomaly_detector import load_anomaly_model, detect_anomaly
          load_anomaly_model()
          result = detect_anomaly(60.0, 5.0, 80.0)
          assert 'is_anomaly' in result, 'Missing is_anomaly key'
          print('✅  Anomaly detector OK:', result)

          from eta_predictor import load_eta_model, predict_eta
          load_eta_model()
          eta = predict_eta(10.0, 8, 1, False, 'clear', 30.0, 60.0)
          assert 'eta_minutes' in eta, 'Missing eta_minutes key'
          print('✅  ETA predictor OK:', eta)

          from optimizer import optimize_headway
          sched = optimize_headway('R1', '2025-01-01', 3, False, False, 7, 10, population_size=10, generations=5)
          assert 'slots' in sched and len(sched['slots']) > 0
          print('✅  Optimizer OK — slots:', len(sched['slots']))
          "

  # ── Docker Build & Push (main branch only) ────────────────────────────────
  docker-push:
    name: Build & Push Docker Images
    needs: [backend-test, frontend-build, ai-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context:   ./backend
          push:      true
          tags:      ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push AI service image
        uses: docker/build-push-action@v5
        with:
          context:   ./ai-service
          push:      true
          tags:      ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context:   ./frontend
          push:      true
          tags:      ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
